<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Duo Photobooth PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary: #f5b000; 
            --primary-hover: #ffc42e;
            --bg-dark: #09090b;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
            --success: #22c55e;
        }

        /* --- RESET & BASE STYLES --- */
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: #050505; overflow-x: hidden;
        }

        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed; color: var(--text-main);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- TYPOGRAPHY --- */
        .title-container { text-align: center; margin-bottom: 25px; width: 100%; }
        h1.title {
            font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; line-height: 1.1;
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 15px rgba(245, 176, 0, 0.2));
        }
        .subtitle { font-size: clamp(0.9rem, 2.5vw, 1.1rem); color: var(--text-muted); margin-top: 5px; font-weight: 400; letter-spacing: 1px; }

        /* --- SCREENS --- */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 1200px; min-height: 100dvh;
            padding: clamp(15px, 4vw, 30px); animation: fadeIn 0.5s ease-out forwards;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INTRO SCREEN --- */
        .intro-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .intro-title { font-size: clamp(3.5rem, 10vw, 7rem); margin-bottom: 0; letter-spacing: 4px; }
        .intro-subtitle { font-size: clamp(1.2rem, 3vw, 2rem); color: var(--primary); font-weight: 600; letter-spacing: 6px; margin-bottom: 50px; text-transform: uppercase; }
        .start-btn { padding: 22px 60px; font-size: 1.2rem; font-weight: 800; border-radius: 50px; animation: pulse 2s infinite; width: auto; min-width: 250px; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 176, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(245, 176, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 176, 0, 0); }
        }

        /* --- SETUP SECTIONS --- */
        .setup-container { 
            width: 100%; max-width: 650px; background: var(--glass-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); border-radius: 28px; 
            padding: clamp(20px, 5vw, 40px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); 
        }
        
        .section-label { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 15px 5px; text-align: left; width: 100%; }
        .smart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; width: 100%; margin-bottom: 35px; }

        .card { background: rgba(255, 255, 255, 0.02); border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; cursor: pointer; transition: all 0.3s; position: relative; min-height: 120px; }
        .card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-4px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .card.active { border-color: var(--primary); background: rgba(245, 176, 0, 0.08); box-shadow: 0 0 25px rgba(245, 176, 0, 0.15); }
        .card .icon { font-size: 36px; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));}
        .card p { margin: 0; font-size: 0.95rem; font-weight: 600; text-align: center; color: var(--text-main); line-height: 1.3; }
        .card img.thumb { width: 55px; height: 55px; object-fit: contain; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6)); }

        .upload-card { border: 2px dashed rgba(245, 176, 0, 0.4); background: transparent; }
        .upload-card:hover { border-color: var(--primary); background: rgba(245, 176, 0, 0.05); }
        input[type="file"] { display: none; }

        /* --- BUTTONS --- */
        .btn { font-size: 1rem; font-weight: 700; padding: 18px 30px; border-radius: 50px; cursor: pointer; transition: all 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #ff9800); color: #000; box-shadow: 0 8px 25px -5px rgba(245, 176, 0, 0.5); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px -5px rgba(245, 176, 0, 0.7); filter: brightness(1.1); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); border-color: rgba(255,255,255,0.3); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .btn-danger:hover { background: var(--danger); color: #fff; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5); transform: translateY(-3px); border-color: var(--danger);}

        /* --- CAMERA AREA --- */
        .camera-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .video-wrapper { position: relative; width: 100%; max-width: 850px; border-radius: 24px; overflow: hidden; border: 2px solid var(--glass-border); background: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.8); transition: all 0.4s; max-height: 65vh; }
        
        /* EXACT ASPECT RATIOS para mag-match sa high res canvas size */
        .video-wrapper.landscape { aspect-ratio: 4/3; }
        .video-wrapper.portrait { aspect-ratio: 3/4; max-width: 450px; margin: 0 auto; } 

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #preview-img { width: 100%; height: 100%; object-fit: contain; background: #050505; }
        .frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 10; }

        /* Controls */
        .controls-row { display: flex; flex-direction: row; flex-wrap: wrap; gap: 15px; width: 100%; max-width: 650px; margin-top: 30px; justify-content: center; }
        .controls-row .btn { flex: 1 1 200px; }

        .countdown-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(6rem, 20vw, 15rem); font-weight: 900; color: white; text-shadow: 0px 10px 40px rgba(0,0,0,0.8); background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 20; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 30; }

    </style>
</head>
<body>

    <div id="intro-screen" class="screen active">
        <div class="intro-wrapper">
            <h1 class="title intro-title">PRIME DUO</h1>
            <p class="intro-subtitle">Photobooth Pro</p>
            <button class="btn btn-primary start-btn" onclick="switchScreen('setup-screen')">👆 Tap to Start</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="title-container">
            <h1 class="title">PRIME DUO</h1>
            <p class="subtitle">Design your perfect shot</p>
        </div>
        
        <div class="setup-container">
            <div class="section-label">1. Choose Orientation</div>
            <div class="smart-grid">
                <div class="card active" onclick="selectOrientation('landscape')" id="ori-landscape"><span class="icon">🖥️</span><p>Landscape</p></div>
                <div class="card" onclick="selectOrientation('portrait')" id="ori-portrait"><span class="icon">📱</span><p>Portrait</p></div>
            </div>

            <div class="section-label">2. Select Overlay Frame</div>
            <div class="smart-grid" id="frame-selection">
                <div class="card active frame-option" onclick="selectFrame('none', this)" id="frame-none"><span class="icon">🚫</span><p>No Frame</p></div>
                <label class="card upload-card frame-option" for="customFrameUpload">
                    <span class="icon" style="color: var(--primary);">➕</span><p>Add PNG</p>
                    <input type="file" id="customFrameUpload" accept="image/png">
                </label>
            </div>
            
            <button class="btn btn-primary" onclick="openCamera()" style="margin-top: 15px;">📸 Open Camera</button>
        </div>
    </div>

    <div id="booth-screen" class="screen">
        <div class="camera-container">
            <div class="title-container" style="margin-bottom: 10px;">
                <h1 class="title" style="font-size: clamp(1.8rem, 4vw, 2.8rem);">STRIKE A POSE</h1>
            </div>
            
            <div class="video-wrapper landscape" id="vid-wrapper">
                <video id="camera" playsinline autoplay></video>
                <img id="live-overlay" class="frame-overlay" src="" style="display:none;">
                <div id="countdown" class="countdown-overlay">3</div>
                <div id="flash" class="flash"></div>
            </div>

            <div class="controls-row" id="booth-controls">
                <button class="btn btn-secondary" onclick="endSession()">⬅ Back</button>
                <button class="btn btn-primary" onclick="startCapture()">📸 Snap Photo</button>
            </div>
            <canvas id="tempCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <div id="preview-screen" class="screen">
        <div class="camera-container">
            <div class="title-container">
                <h1 class="title" style="font-size: clamp(1.8rem, 4vw, 2.8rem);">LOOKS GREAT!</h1>
                <p class="subtitle">Keep this photo or try again?</p>
            </div>
            <div class="video-wrapper landscape" id="preview-wrapper">
                <img id="preview-img" src="">
            </div>
            <div class="controls-row">
                <button class="btn btn-danger" onclick="retakePhoto()">🗑️ Retake</button>
                <button class="btn btn-primary" onclick="savePhoto()">💾 Save & Upload</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="title-container" style="margin-bottom: 40px;">
            <h1 class="title" id="resultTitle" style="font-size: clamp(2.5rem, 6vw, 4.5rem);">UPLOADING</h1>
            <p id="uploadStatus" class="subtitle" style="font-size: clamp(1rem, 3vw, 1.3rem);">Saving securely to the cloud...</p>
        </div>
        <div id="success-buttons" class="controls-row" style="display:none; justify-content: center;">
            <button class="btn btn-primary" onclick="startNewSession()" style="max-width: 350px;">✨ New Session</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getStorage, ref, uploadString } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDrTbjnBeyNTQZU3hkaGfnXESvOKaQBIKk",
            authDomain: "photobooth-d94d3.firebaseapp.com",
            projectId: "photobooth-d94d3",
            storageBucket: "photobooth-d94d3.firebasestorage.app",
            messagingSenderId: "557746814376",
            appId: "1:557746814376:web:fb4e9379767db0c39ab19d"
        };
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        window.config = { orientation: 'landscape', frameSrc: null };
        let streamActive = null;
        let currentPhotoDataUrl = null;

        // Elements
        const video = document.getElementById('camera');
        const vidWrapper = document.getElementById('vid-wrapper');
        const previewWrapper = document.getElementById('preview-wrapper');
        const overlayImg = document.getElementById('live-overlay');
        const previewImg = document.getElementById('preview-img');
        const tempCanvas = document.getElementById('tempCanvas');
        const tempCtx = tempCanvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const boothControls = document.getElementById('booth-controls');

        // --- NAVIGATION ---
        window.switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.selectOrientation = (type) => {
            config.orientation = type;
            document.getElementById('ori-landscape').classList.remove('active');
            document.getElementById('ori-portrait').classList.remove('active');
            document.getElementById(`ori-${type}`).classList.add('active');
            vidWrapper.className = `video-wrapper ${type}`;
            previewWrapper.className = `video-wrapper ${type}`;
        };

        window.selectFrame = (srcUrl, cardElement) => {
            document.querySelectorAll('.frame-option').forEach(c => c.classList.remove('active'));
            if (srcUrl === 'none') {
                config.frameSrc = null;
                overlayImg.style.display = 'none';
            } else {
                config.frameSrc = srcUrl;
                overlayImg.src = srcUrl;
                overlayImg.style.display = 'block';
            }
            if(cardElement) cardElement.classList.add('active');
        };

        let customFrameCount = 1;
        document.getElementById('customFrameUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const src = event.target.result;
                    const newCard = document.createElement('div');
                    newCard.className = 'card frame-option';
                    newCard.innerHTML = `<img src="${src}" class="thumb"><p>Frame ${customFrameCount++}</p>`;
                    newCard.onclick = function() { selectFrame(src, newCard); };
                    const uploadLabel = document.querySelector('.upload-card');
                    document.getElementById('frame-selection').insertBefore(newCard, uploadLabel);
                    selectFrame(src, newCard);
                };
                reader.readAsDataURL(file);
                e.target.value = ''; 
            }
        });

        // --- CAMERA ---
        window.openCamera = async () => {
            switchScreen('booth-screen');
            boothControls.style.display = 'flex';

            if (config.frameSrc) {
                overlayImg.src = config.frameSrc;
                overlayImg.style.display = 'block';
            } else {
                overlayImg.style.display = 'none';
            }

            try {
                // Pinilit natin kumuha ng pinaka malinaw (1080p High Res)
                const constraints = { video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } } };
                streamActive = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = streamActive;
            } catch (err) { alert("Camera access denied or unavailable. Please check browser permissions."); }
        };

        window.endSession = () => {
            if (streamActive) streamActive.getTracks().forEach(track => track.stop());
            switchScreen('setup-screen');
        };

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const playCountdown = async () => {
            countdownEl.style.opacity = '1';
            for (let i = 3; i > 0; i--) { countdownEl.innerText = i; await sleep(1000); }
            countdownEl.style.opacity = '0';
            flashEl.style.opacity = '1';
            setTimeout(() => { flashEl.style.opacity = '0'; }, 150);
        };

        // --- SNAP & EXACT RENDER (WYSIWYG) ---
        window.startCapture = async () => {
            boothControls.style.display = 'none';
            await playCountdown();
            
            // TINAASAN ANG RESOLUTION (High Res: 1600x1200 or 1200x1600)
            if (config.orientation === 'landscape') { 
                tempCanvas.width = 1600; 
                tempCanvas.height = 1200; 
            } else { 
                tempCanvas.width = 1200; 
                tempCanvas.height = 1600; 
            }
            
            const canvasW = tempCanvas.width;
            const canvasH = tempCanvas.height;
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            
            // Exact "object-fit: cover" math para sa canvas 
            // Wala ng squish, wala ng shrink!
            const scale = Math.max(canvasW / videoW, canvasH / videoH);
            const drawW = videoW * scale;
            const drawH = videoH * scale;
            
            // I-center crop gaya sa HTML
            const startX = (canvasW - drawW) / 2;
            const startY = (canvasH - drawH) / 2;

            tempCtx.save();
            // Mirror image handling
            tempCtx.translate(canvasW, 0);
            tempCtx.scale(-1, 1);
            
            // Draw cropped video exactly as seen in preview
            tempCtx.drawImage(video, startX, startY, drawW, drawH);
            tempCtx.restore();

            // Draw Overlay PNG
            if (config.frameSrc) {
                const img = new Image();
                img.src = config.frameSrc;
                await new Promise(r => { img.onload = r; });
                tempCtx.drawImage(img, 0, 0, canvasW, canvasH);
            }
            
            currentPhotoDataUrl = tempCanvas.toDataURL('image/jpeg', 1.0); // 1.0 Maximum Quality
            previewImg.src = currentPhotoDataUrl;
            switchScreen('preview-screen');
        };

        window.retakePhoto = () => {
            currentPhotoDataUrl = null;
            previewImg.src = "";
            switchScreen('booth-screen');
            boothControls.style.display = 'flex';
        };

        window.savePhoto = async () => {
            switchScreen('result-screen');
            const titleEl = document.getElementById('resultTitle');
            const statusEl = document.getElementById('uploadStatus');
            
            titleEl.innerText = "UPLOADING";
            titleEl.style.background = "linear-gradient(135deg, #ffffff 0%, var(--primary) 100%)";
            titleEl.style.webkitBackgroundClip = "text";
            statusEl.innerText = "Saving securely to the cloud...";
            document.getElementById('success-buttons').style.display = 'none';

            const fileName = `photos/prime_${Date.now()}.jpg`;
            const storageRef = ref(storage, fileName);

            try {
                await uploadString(storageRef, currentPhotoDataUrl, 'data_url');
                titleEl.innerText = "SUCCESS!";
                titleEl.style.background = "linear-gradient(135deg, #4ade80 0%, #16a34a 100%)";
                titleEl.style.webkitBackgroundClip = "text";
                statusEl.innerText = "Photo saved successfully!";
                document.getElementById('success-buttons').style.display = 'flex';
            } catch (error) {
                console.error(error);
                titleEl.innerText = "ERROR";
                titleEl.style.background = "linear-gradient(135deg, #f87171 0%, #dc2626 100%)";
                titleEl.style.webkitBackgroundClip = "text";
                statusEl.innerText = "Upload failed. Please check your internet connection.";
                document.getElementById('success-buttons').style.display = 'flex';
            }
        };

        // Direktang babalik sa Start / Setup screen nang walang password
        window.startNewSession = () => {
            currentPhotoDataUrl = null;
            endSession();
        };

    </script>
</body>
</html>
