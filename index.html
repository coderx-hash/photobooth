<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Duo Photobooth PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary: #f5b000; 
            --primary-hover: #ffc42e;
            --bg-dark: #09090b;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
            --success: #22c55e;
        }

        /* --- RESET & BASE STYLES --- */
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: #050505; overflow-x: hidden;
        }

        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed; color: var(--text-main);
            min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- TYPOGRAPHY --- */
        .title-container { text-align: center; margin-bottom: 25px; width: 100%; }
        h1.title {
            font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; line-height: 1.1;
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 15px rgba(245, 176, 0, 0.2));
        }
        .subtitle { font-size: clamp(0.9rem, 2.5vw, 1.1rem); color: var(--text-muted); margin-top: 5px; font-weight: 400; letter-spacing: 1px; }

        /* --- SCREENS --- */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 1400px; min-height: 100dvh;
            padding: clamp(15px, 4vw, 30px); animation: fadeIn 0.5s ease-out forwards;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INTRO SCREEN --- */
        .intro-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .intro-title { font-size: clamp(3.5rem, 10vw, 7rem); margin-bottom: 0; letter-spacing: 4px; }
        .intro-subtitle { font-size: clamp(1.2rem, 3vw, 2rem); color: var(--primary); font-weight: 600; letter-spacing: 6px; margin-bottom: 50px; text-transform: uppercase; }
        .start-btn { padding: 22px 60px; font-size: 1.2rem; font-weight: 800; border-radius: 50px; animation: pulse 2s infinite; width: auto; min-width: 250px; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 176, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(245, 176, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 176, 0, 0); }
        }

        /* --- SETUP SECTIONS --- */
        .setup-container { 
            width: 100%; max-width: 650px; background: var(--glass-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); border-radius: 28px; 
            padding: clamp(20px, 5vw, 40px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); 
        }
        
        .section-label { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 15px 5px; text-align: left; width: 100%; }
        .smart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; width: 100%; margin-bottom: 35px; }

        .card { background: rgba(255, 255, 255, 0.02); border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; cursor: pointer; transition: all 0.3s; position: relative; min-height: 120px; }
        .card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-4px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .card.active { border-color: var(--primary); background: rgba(245, 176, 0, 0.08); box-shadow: 0 0 25px rgba(245, 176, 0, 0.15); }
        .card .icon { font-size: 36px; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));}
        .card p { margin: 0; font-size: 0.95rem; font-weight: 600; text-align: center; color: var(--text-main); line-height: 1.3; }
        .card img.thumb { width: 55px; height: 55px; object-fit: contain; margin-bottom: 12px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6)); }

        .upload-card { border: 2px dashed rgba(245, 176, 0, 0.4); background: transparent; }
        .upload-card:hover { border-color: var(--primary); background: rgba(245, 176, 0, 0.05); }
        input[type="file"] { display: none; }

        /* --- BUTTONS --- */
        .btn { font-size: 1rem; font-weight: 700; padding: 18px 30px; border-radius: 50px; cursor: pointer; transition: all 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #ff9800); color: #000; box-shadow: 0 8px 25px -5px rgba(245, 176, 0, 0.5); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px -5px rgba(245, 176, 0, 0.7); filter: brightness(1.1); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); border-color: rgba(255,255,255,0.3); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .btn-danger:hover { background: var(--danger); color: #fff; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5); transform: translateY(-3px); border-color: var(--danger);}

        select.btn {
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            text-align-last: center;
            outline: none;
            cursor: pointer;
        }
        select.btn option { background: var(--bg-dark); color: var(--text-main); }

        /* --- RESPONSIVE CAMERA AREA --- */
        .camera-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 100%; }
        
        .live-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; width: 100%; justify-content: center; max-width: 900px; }
        .live-controls .btn { padding: 12px 20px; font-size: 0.85rem; width: auto; flex: 1; max-width: 200px; }
        #camera-select { flex: 2; max-width: 300px; }

        /* Dynamic video wrapper handling portrait and landscape */
        .video-wrapper { 
            position: relative; width: 100%; max-height: 800px; 
            border-radius: 24px; overflow: hidden; border: 2px solid var(--glass-border); 
            background: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.8); transition: all 0.4s;
            display: flex; justify-content: center; align-items: center;
        }

        .video-wrapper.landscape { aspect-ratio: 16/9; max-width: 1000px; height: 60vh; }
        .video-wrapper.portrait { aspect-ratio: 9/16; max-width: 450px; height: 65vh; margin: 0 auto; }
        
        @media (min-width: 1024px) {
            .video-wrapper.landscape { height: 75vh; }
        }

        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        #preview-img { width: 100%; height: 100%; object-fit: contain; background: #050505; }
        
        .frame-overlay { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 100%; height: auto; 
            pointer-events: auto; cursor: grab; z-index: 10; 
        }
        .frame-overlay:active { cursor: grabbing; }

        #overlay-controls {
            width: 100%; max-width: 650px; margin-top: 15px; 
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); 
            padding: 15px; border-radius: 16px; text-align: center;
        }

        .controls-row { display: flex; flex-direction: row; flex-wrap: wrap; gap: 15px; width: 100%; max-width: 650px; margin-top: 20px; justify-content: center; }
        .controls-row .btn { flex: 1 1 200px; }

        .countdown-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(6rem, 20vw, 15rem); font-weight: 900; color: white; text-shadow: 0px 10px 40px rgba(0,0,0,0.8); background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 20; }
        .flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 30; }

    </style>
</head>
<body>

    <div id="intro-screen" class="screen active">
        <div class="intro-wrapper">
            <h1 class="title intro-title">PRIME DUO</h1>
            <p class="intro-subtitle">Photobooth Pro</p>
            <button class="btn btn-primary start-btn" onclick="switchScreen('setup-screen')">👆 Tap to Start</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="title-container">
            <h1 class="title">PRIME DUO</h1>
            <p class="subtitle">Select your frame design</p>
        </div>
        
        <div class="setup-container">
            <div class="section-label">Select Overlay Frame</div>
            <div class="smart-grid" id="frame-selection">
                <div class="card active frame-option" onclick="selectFrame('none', this)" id="frame-none"><span class="icon">🚫</span><p>No Frame</p></div>
                <label class="card upload-card frame-option" for="customFrameUpload">
                    <span class="icon" style="color: var(--primary);">➕</span><p>Add PNG</p>
                    <input type="file" id="customFrameUpload" accept="image/png">
                </label>
            </div>
            
            <button class="btn btn-primary" onclick="openCamera()" style="margin-top: 15px;">📸 Open Camera</button>
        </div>
    </div>

    <div id="booth-screen" class="screen">
        <div class="camera-container">
            <div class="title-container" style="margin-bottom: 10px;">
                <h1 class="title" style="font-size: clamp(1.8rem, 4vw, 2.8rem);">STRIKE A POSE</h1>
            </div>
            
            <div class="live-controls" id="live-controls">
                <button class="btn btn-secondary" onclick="toggleOrientation()">🔄 Rotate</button>
                <select id="camera-select" class="btn btn-secondary" onchange="changeCamera()">
                    <option>Loading cameras...</option>
                </select>
                <button class="btn btn-secondary" onclick="toggleMirror()">🪞 Mirror</button>
            </div>

            <div class="video-wrapper landscape" id="vid-wrapper">
                <video id="camera" playsinline autoplay></video>
                <img id="live-overlay" class="frame-overlay" src="" style="display:none;" draggable="false">
                <div id="countdown" class="countdown-overlay">3</div>
                <div id="flash" class="flash"></div>
            </div>

            <div id="overlay-controls" style="display:none;">
                <p style="margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: var(--text-main);">🖼️ Resize your PNG</p>
                <input type="range" id="overlaySize" min="10" max="200" value="100" style="width: 80%; cursor: pointer;">
                <p style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); font-weight: 400;">Drag the image above to move it around</p>
            </div>

            <div class="controls-row" id="booth-controls">
                <button class="btn btn-secondary" onclick="endSession()">⬅ Back</button>
                <button class="btn btn-primary" onclick="startCapture()">📸 Snap Photo</button>
            </div>
            <canvas id="tempCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <div id="preview-screen" class="screen">
        <div class="camera-container">
            <div class="title-container">
                <h1 class="title" style="font-size: clamp(1.8rem, 4vw, 2.8rem);">LOOKS GREAT!</h1>
                <p class="subtitle">Keep this photo or try again?</p>
            </div>
            <div class="video-wrapper landscape" id="preview-wrapper">
                <img id="preview-img" src="">
            </div>
            <div class="controls-row">
                <button class="btn btn-danger" onclick="retakePhoto()">🗑️ Retake</button>
                <button class="btn btn-primary" onclick="savePhoto()">💾 Save to Device</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="title-container" style="margin-bottom: 40px;">
            <h1 class="title" id="resultTitle" style="font-size: clamp(2.5rem, 6vw, 4.5rem);">SAVING</h1>
            <p id="uploadStatus" class="subtitle" style="font-size: clamp(1rem, 3vw, 1.3rem);">Saving securely to your device...</p>
        </div>
        <div id="success-buttons" class="controls-row" style="display:none; justify-content: center;">
            <button class="btn btn-primary" onclick="startNewSession()" style="max-width: 350px;">✨ New Session</button>
        </div>
    </div>

    <script>
        // State variables
        window.config = { orientation: 'landscape', frameSrc: null };
        let streamActive = null;
        let currentPhotoDataUrl = null;
        let currentDeviceId = null;
        let isMirrored = false; 

        // Elements
        const video = document.getElementById('camera');
        const vidWrapper = document.getElementById('vid-wrapper');
        const previewWrapper = document.getElementById('preview-wrapper');
        const overlayImg = document.getElementById('live-overlay');
        const previewImg = document.getElementById('preview-img');
        const tempCanvas = document.getElementById('tempCanvas');
        const tempCtx = tempCanvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const flashEl = document.getElementById('flash');
        const boothControls = document.getElementById('booth-controls');
        const liveControls = document.getElementById('live-controls');
        const cameraSelect = document.getElementById('camera-select');

        // --- OVERLAY RESIZE SLIDER ---
        document.getElementById('overlaySize').addEventListener('input', function(e) {
            overlayImg.style.width = e.target.value + '%';
        });

        // --- OVERLAY DRAG LOGIC ---
        function makeOverlayDraggable(el) {
            let isDragging = false, startX, startY, initialLeft, initialTop;

            const dragStart = (e) => {
                isDragging = true;
                if (e.type === "touchstart") { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
                else { startX = e.clientX; startY = e.clientY; }

                const style = window.getComputedStyle(el);
                initialLeft = parseFloat(style.left) || 0;
                initialTop = parseFloat(style.top) || 0;
                el.style.cursor = 'grabbing';
            };

            const dragMove = (e) => {
                if (!isDragging) return;
                e.preventDefault(); 
                let currentX, currentY;
                if (e.type === "touchmove") { currentX = e.touches[0].clientX; currentY = e.touches[0].clientY; }
                else { currentX = e.clientX; currentY = e.clientY; }

                let dx = currentX - startX;
                let dy = currentY - startY;

                el.style.left = `${initialLeft + dx}px`;
                el.style.top = `${initialTop + dy}px`;
            };

            const dragEnd = () => { isDragging = false; el.style.cursor = 'grab'; };

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }
        
        makeOverlayDraggable(overlayImg);

        // --- NAVIGATION & SETTINGS ---
        window.switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.selectFrame = (srcUrl, cardElement) => {
            document.querySelectorAll('.frame-option').forEach(c => c.classList.remove('active'));
            if (srcUrl === 'none') {
                config.frameSrc = null;
            } else {
                config.frameSrc = srcUrl;
            }
            if(cardElement) cardElement.classList.add('active');
        };

        let customFrameCount = 1;
        document.getElementById('customFrameUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const src = event.target.result;
                    const newCard = document.createElement('div');
                    newCard.className = 'card frame-option';
                    newCard.innerHTML = `<img src="${src}" class="thumb"><p>Frame ${customFrameCount++}</p>`;
                    newCard.onclick = function() { selectFrame(src, newCard); };
                    const uploadLabel = document.querySelector('.upload-card');
                    document.getElementById('frame-selection').insertBefore(newCard, uploadLabel);
                    selectFrame(src, newCard);
                };
                reader.readAsDataURL(file);
                e.target.value = ''; 
            }
        });

        // --- LIVE CAMERA CONTROLS ---
        window.toggleOrientation = () => {
            config.orientation = config.orientation === 'landscape' ? 'portrait' : 'landscape';
            vidWrapper.className = `video-wrapper ${config.orientation}`;
            previewWrapper.className = `video-wrapper ${config.orientation}`;
        };

        window.toggleMirror = () => {
            isMirrored = !isMirrored;
            applyMirror();
        };

        function applyMirror() {
            if (isMirrored) {
                video.style.transform = "scaleX(-1)";
            } else {
                video.style.transform = "scaleX(1)";
            }
        }

        async function getCameras() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            
            cameraSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });

            if (currentDeviceId) {
                cameraSelect.value = currentDeviceId;
            } else if (videoDevices.length > 0) {
                currentDeviceId = videoDevices[0].deviceId;
                cameraSelect.value = currentDeviceId;
            }
        }

        window.changeCamera = async () => {
            currentDeviceId = cameraSelect.value;
            await startVideoStream(currentDeviceId);
        };

        async function startVideoStream(deviceId = null) {
            if (streamActive) streamActive.getTracks().forEach(track => track.stop());
            
            const constraints = { 
                video: { width: { ideal: 3840 }, height: { ideal: 2160 } } 
            };

            if (deviceId) {
                constraints.video.deviceId = { exact: deviceId };
            } else {
                constraints.video.facingMode = "environment"; 
            }

            try {
                streamActive = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = streamActive;

                const track = streamActive.getVideoTracks()[0];
                currentDeviceId = track.getSettings().deviceId;

                await getCameras();
                applyMirror();
            } catch (err) { 
                alert("Camera access denied or unavailable. Please check browser permissions."); 
                console.error(err);
            }
        }

        window.openCamera = async () => {
            switchScreen('booth-screen');
            boothControls.style.display = 'flex';
            liveControls.style.display = 'flex';

            if (config.frameSrc) {
                overlayImg.src = config.frameSrc;
                overlayImg.style.display = 'block';
                overlayImg.style.width = '100%';
                overlayImg.style.top = '50%';
                overlayImg.style.left = '50%';
                document.getElementById('overlaySize').value = 100;
                document.getElementById('overlay-controls').style.display = 'block';
            } else {
                overlayImg.style.display = 'none';
                document.getElementById('overlay-controls').style.display = 'none';
            }

            await startVideoStream();
        };

        window.endSession = () => {
            if (streamActive) streamActive.getTracks().forEach(track => track.stop());
            switchScreen('setup-screen');
        };

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const playCountdown = async () => {
            countdownEl.style.opacity = '1';
            for (let i = 3; i > 0; i--) { countdownEl.innerText = i; await sleep(1000); }
            countdownEl.style.opacity = '0';
            flashEl.style.opacity = '1';
            setTimeout(() => { flashEl.style.opacity = '0'; }, 150);
        };

        // --- SNAP & EXACT RENDER (HIGH RESOLUTION) ---
        window.startCapture = async () => {
            boothControls.style.display = 'none';
            liveControls.style.display = 'none';
            document.getElementById('overlay-controls').style.display = 'none';
            await playCountdown();
            
            const isLandscape = config.orientation === 'landscape';
            if (isLandscape) { 
                tempCanvas.width = 3840; 
                tempCanvas.height = 2160; 
            } else { 
                tempCanvas.width = 2160; 
                tempCanvas.height = 3840; 
            }
            
            const canvasW = tempCanvas.width;
            const canvasH = tempCanvas.height;
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            
            const scale = Math.max(canvasW / videoW, canvasH / videoH);
            const drawW = videoW * scale;
            const drawH = videoH * scale;
            const startX = (canvasW - drawW) / 2;
            const startY = (canvasH - drawH) / 2;

            tempCtx.save();
            if (isMirrored) {
                tempCtx.translate(canvasW, 0);
                tempCtx.scale(-1, 1);
            }
            tempCtx.drawImage(video, startX, startY, drawW, drawH);
            tempCtx.restore();

            if (config.frameSrc) {
                const img = new Image();
                img.src = config.frameSrc;
                await new Promise(r => { img.onload = r; });

                const wrapperRect = vidWrapper.getBoundingClientRect();
                const elRect = overlayImg.getBoundingClientRect();

                const scaleX = canvasW / wrapperRect.width;
                const scaleY = canvasH / wrapperRect.height;

                const centerX = elRect.left + (elRect.width / 2);
                const centerY = elRect.top + (elRect.height / 2);

                const relativeX = centerX - wrapperRect.left;
                const relativeY = centerY - wrapperRect.top;

                const finalX = relativeX * scaleX;
                const finalY = relativeY * scaleY;
                const imgDrawW = elRect.width * scaleX;
                const imgDrawH = elRect.height * scaleY;

                tempCtx.drawImage(img, finalX - (imgDrawW / 2), finalY - (imgDrawH / 2), imgDrawW, imgDrawH);
            }
            
            currentPhotoDataUrl = tempCanvas.toDataURL('image/jpeg', 1.0); 
            previewImg.src = currentPhotoDataUrl;
            switchScreen('preview-screen');
        };

        window.retakePhoto = () => {
            currentPhotoDataUrl = null;
            previewImg.src = "";
            switchScreen('booth-screen');
            boothControls.style.display = 'flex';
            liveControls.style.display = 'flex';
            if(config.frameSrc) document.getElementById('overlay-controls').style.display = 'block';
        };

        // --- LOCAL STORAGE & DOWNLOAD ---
        window.savePhoto = () => {
            switchScreen('result-screen');
            const titleEl = document.getElementById('resultTitle');
            const statusEl = document.getElementById('uploadStatus');
            
            titleEl.innerText = "SAVING";
            titleEl.style.background = "linear-gradient(135deg, #ffffff 0%, var(--primary) 100%)";
            titleEl.style.webkitBackgroundClip = "text";
            statusEl.innerText = "Downloading photo to your device...";
            document.getElementById('success-buttons').style.display = 'none';

            try {
                // Trigger Direct Download
                const a = document.createElement('a');
                a.href = currentPhotoDataUrl;
                a.download = `PrimeDuo_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // Save thumbnail to Local Storage (History)
                try {
                    let photos = JSON.parse(localStorage.getItem('savedPhotos') || '[]');
                    photos.push(currentPhotoDataUrl);
                    if(photos.length > 10) photos.shift(); // Keep only latest 10
                    localStorage.setItem('savedPhotos', JSON.stringify(photos));
                } catch(e) {
                    console.warn("Local storage full, skipped history update.");
                }

                setTimeout(() => {
                    titleEl.innerText = "SUCCESS!";
                    titleEl.style.background = "linear-gradient(135deg, #4ade80 0%, #16a34a 100%)";
                    titleEl.style.webkitBackgroundClip = "text";
                    statusEl.innerText = "Photo saved successfully to your device!";
                    document.getElementById('success-buttons').style.display = 'flex';
                }, 800);

            } catch (error) {
                console.error(error);
                titleEl.innerText = "ERROR";
                titleEl.style.background = "linear-gradient(135deg, #f87171 0%, #dc2626 100%)";
                titleEl.style.webkitBackgroundClip = "text";
                statusEl.innerText = "Failed to save photo.";
                document.getElementById('success-buttons').style.display = 'flex';
            }
        };

        window.startNewSession = () => {
            currentPhotoDataUrl = null;
            endSession();
        };

    </script>
</body>
</html>
